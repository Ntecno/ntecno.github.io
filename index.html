<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novaterra | Premium Portal</title>
    <style>
        /* MODERN DİZAYN AYARLARI */
        :root {
            --glow: #00ffcc;
            --mc-green: #3fb518;
            --dark-glass: rgba(0, 0, 0, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            background: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            /* Arxa fon şəkli (HD Modern Gamer Style) */
            background-image: radial-gradient(circle at center, rgba(0, 255, 204, 0.1) 0%, transparent 70%), 
                              url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070&auto=format&fit=crop');
            background-attachment: fixed;
            background-size: cover;
        }

        /* HEADER (QURUCU VƏ BAŞLIQ) */
        .header {
            text-align: center;
            padding: 60px 20px;
            border-bottom: 1px solid rgba(0, 255, 204, 0.2);
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 5px;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--glow));
        }

        .creator-tag {
            background: var(--glow);
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        /* MODERN AXTARIŞ SİSTEMİ */
        .search-area {
            max-width: 700px;
            margin: 40px auto;
            position: relative;
        }

        input#movieInput {
            width: 100%;
            padding: 20px 30px;
            border-radius: 15px;
            border: 1px solid var(--glow);
            background: var(--dark-glass);
            color: white;
            font-size: 1.2rem;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input#movieInput:focus {
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.4);
            outline: none;
        }
