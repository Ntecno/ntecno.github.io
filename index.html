<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ntecno | Innovation Flow</title>
    <style>
        :root {
            --gold: #d4af37;
            --black: #080808;
            --gray: #151515;
            --white: #ffffff;
            --text-gray: #a0a0a0;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--black);
            color: var(--white);
            scroll-behavior: smooth;
        }

        /* Navigasiya */
        nav {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.95);
            border-bottom: 1px solid #222;
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .brand { font-size: 26px; font-weight: 900; color: var(--gold); letter-spacing: 4px; }

        .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-size: 14px; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }

        /* Hero Section */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, #1a1a1a 0%, #080808 100%);
            border-bottom: 1px solid #111;
        }

        .hero h1 { font-size: clamp(60px, 10vw, 120px); margin: 0; font-weight: 900; letter-spacing: -2px; }
        .founder-box { background: var(--gold); color: black; padding: 5px 25px; border-radius: 50px; font-weight: bold; margin-top: 20px; }

        /* Arama Çubuğu */
        .search-area { padding: 50px 5%; text-align: center; }
        #searchInput {
            width: 70%; max-width: 600px;
            padding: 18px 30px;
            border-radius: 50px;
            border: 1px solid #333;
            background: var(--gray);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }

        /* Xidmətlər (Services) */
        .services { padding: 100px 8%; background: #0a0a0a; text-align: center; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; margin-top: 50px; }
        .service-card { padding: 40px; background: var(--gray); border-radius: 20px; transition: 0.3s; border: 1px solid #111; }
        .service-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .service-card i { font-size: 40px; color: var(--gold); display: block; margin-bottom: 20px; }

        .projects { padding: 100px 8%; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
