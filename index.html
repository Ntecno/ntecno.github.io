<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novaterra | Ultimate Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. CORE SYSTEM & ANIMATIONS
           ========================================= */
        :root {
            --neon: #00ffcc;
            --yt: #ff0000;
            --bg-dark: #020202;
            --glass: rgba(255, 255, 255, 0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #0a1a2a 0%, #020202 100%);
        }

        @keyframes neonPulse {
            0% { text-shadow: 0 0 10px var(--neon); }
            50% { text-shadow: 0 0 30px var(--neon), 0 0 40px var(--neon); }
            100% { text-shadow: 0 0 10px var(--neon); }
        }

        /* =========================================
           2. HEADER (FOUNDER & LOGO)
           ========================================= */
        header {
            padding: 25px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.9);
            border-bottom: 3px solid var(--neon);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(20px);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--neon);
            animation: neonPulse 3s infinite;
            text-decoration: none;
        }

        .founder-tag {
            background: var(--neon);
            color: #000;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
            box-shadow: 0 0 20px var(--neon);
        }
