<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTECNO | Official Digital Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. NTECNO BRANDING & CORE */
        :root {
            --ntecno-blue: #00d2ff;
            --ntecno-glow: rgba(0, 210, 255, 0.5);
            --dark-space: #010101;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--dark-space);
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* 2. TECH BACKGROUND ANIMATION */
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--ntecno-glow) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--ntecno-glow) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: top;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid { from { background-position: 0 0; } to { background-position: 0 50px; } }

        /* 3. NTECNO HEADER */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px 8%; background: rgba(0, 0, 0, 0.95);
            border-bottom: 2px solid var(--ntecno-blue);
            position: sticky; top: 0; z-index: 2000;
            box-shadow: 0 5px 30px var(--ntecno-glow);
        }

        .ntecno-logo {
            font-family: 'Syncopate', sans-serif; font-size: 2.2rem;
            color: var(--ntecno-blue); text-shadow: 0 0 15px var(--ntecno-blue);
            text-decoration: none; font-weight: 700;
        }

        .founder-badge {
            border: 1px solid var(--ntecno-blue); color: var(--ntecno-blue);
            padding: 8px 25px; border-radius: 4px; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* 4. GLOBAL MOVIE ENGINE */
        .search-area {
            height: 70vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .search-area h1 {
            font-size: 3.5rem; margin-bottom: 40px; color: #fff;
            text-transform: uppercase; letter-spacing: 10px;
        }

        .ntecno-search { width: 100%; max-width: 900px; position: relative; }
        .ntecno-search input {
            width: 100%; padding: 30px 50px; border-radius: 5px;
            background: rgba(0,0,0,0.8); border: 2px solid var(--ntecno-blue);
            color: #fff; font-size: 1.6rem; font-family: 'Orbitron';
            transition: 0.5s; box-shadow: inset 0 0 20px var(--ntecno-glow);
        }

        .ntecno-search input:focus {
            box-shadow: 0 0 50px var(--ntecno-blue); transform: scale(1.03);
        }

        /* 5. CINEMA PORTAL */
        #ntecnoPlayer {
            max-width: 1200px; margin: -100px auto 100px;
            display: none; border: 4px solid var(--ntecno-blue);
            background: #000; position: relative;
            animation: fadeIn 1s ease;
        }

        .iframe-wrap { position: relative; padding-bottom: 56.25%; height: 0; }
        .iframe-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 6. INFORMATION GRID */
        .ntecno-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px; padding: 100px 10%;
        }

        .n-card {
            background: var(--glass); padding: 50px; border-radius: 2px;
            border-right: 4px solid var(--ntecno-blue); transition: 0.4s;
        }

        .n-card:hover { background: rgba(0, 210, 255, 0.1); transform: translateX(10px); }

        /* 7. THE FOUNDER (NICAT RƏHİMLİ) */
        .founder-section {
            padding: 100px 10%; background: #050505;
            display: flex; align-items: center; gap: 60px;
            border-top: 1px solid #222;
        }

        .founder-circle {
            min-width: 200px; height: 200px; border: 5px solid var(--ntecno-blue);
            border-radius: 50%; box-shadow: 0 0 40px var(--ntecno-blue);
            background: #111;
        }
