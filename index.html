<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ntecno | Innovation Flow</title>
    <style>
        :root {
            --gold: #d4af37;
            --black: #0a0a0a;
            --gray: #1a1a1a;
            --white: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--black);
            color: var(--white);
            scroll-behavior: smooth;
        }

        /* Navigasyon */
        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid #333;
            position: sticky; top: 0; z-index: 1000;
        }

        .brand { font-size: 28px; font-weight: 800; color: var(--gold); letter-spacing: 3px; }

        .lang-switcher select {
            background: transparent; color: var(--white);
            border: 1px solid var(--gold); padding: 5px 10px; border-radius: 5px;
        }

        /* Axtarış Çubuğu */
        .search-container {
            padding: 40px 5%;
            text-align: center;
            background: linear-gradient(to bottom, #111, #0a0a0a);
        }

        #searchInput {
            width: 60%;
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid var(--gold);
            background: #000;
            color: white;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
        }

        #searchInput:focus { box-shadow: 0 0 15px var(--gold); }
